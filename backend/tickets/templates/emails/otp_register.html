<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to OpenWeave — your sign-up code</title>
</head>
<body style="margin:0;padding:0;background:#0a0a0f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0a0a0f;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">

          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <div style="display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;background:#4f46e5;border-radius:12px;">
                <span style="color:#fff;font-size:22px;line-height:48px;">⟳</span>
              </div>
              <p style="margin:8px 0 0;color:#a1a1aa;font-size:14px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;">OpenWeave</p>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background:#111118;border:1px solid #222233;border-radius:16px;padding:40px 36px;">

              <h1 style="margin:0 0 8px;color:#fff;font-size:22px;font-weight:700;">Welcome to OpenWeave</h1>
              <p style="margin:0 0 32px;color:#a1a1aa;font-size:15px;line-height:1.6;">
                Enter the code below to finish creating your account. No password needed.
              </p>

              <!-- Code block -->
              <div style="background:#0a0a0f;border:1px solid #3f3f46;border-radius:12px;padding:24px;text-align:center;margin-bottom:32px;">
                <span style="font-size:40px;font-weight:800;letter-spacing:0.25em;color:#fff;font-family:monospace;">{{ code }}</span>
              </div>

              <p style="margin:0 0 8px;color:#71717a;font-size:13px;line-height:1.6;">
                This code expires in <strong style="color:#a1a1aa;">15 minutes</strong>.
              </p>
              <p style="margin:0;color:#71717a;font-size:13px;line-height:1.6;">
                If you didn't sign up for OpenWeave, you can safely ignore this email.
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;color:#52525b;font-size:12px;">
                © OpenWeave · Agentic support &amp; ticketing
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
