[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "python manage.py collectstatic --noinput && python manage.py migrate --noinput && python manage.py createsuperadmin && python manage.py seed && gunicorn agentdesk.wsgi:application --bind 0.0.0.0:$PORT"
