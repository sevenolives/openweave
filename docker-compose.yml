version: "3.9"

services:
  db:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: openweave
      POSTGRES_USER: openweave
      POSTGRES_PASSWORD: openweave
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://openweave:openweave@db:5432/openweave
      SECRET_KEY: dev-local-secret-key
      SUPERUSER_PASSWORD: admin123
      DEBUG: "1"
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  pgdata:
